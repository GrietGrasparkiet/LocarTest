<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LocAR Pure Setup</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- LocAR -->
  <script src="https://cdn.jsdelivr.net/npm/locar.js/dist/locar.min.js"></script>
</head>

<body>
  <a-scene
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    embedded
    device-orientation-permission-ui="enabled: true"
  >
    <!-- Camera -->
    <a-camera id="camera" position="0 1.6 0"></a-camera>

    <!-- LocAR entity -->
    <a-entity id="locar-root"></a-entity>
  </a-scene>

  <script>
    // Start LocAR
    const locar = new LocAR({
      el: document.querySelector("#locar-root"),
      camera: document.querySelector("#camera")
    });

    // Voeg object toe
    locar.add({
      lat: 53.032,
      lon: 5.658,
      element: document.createElement("a-box")
    });
  </script>
</body>
</html>
