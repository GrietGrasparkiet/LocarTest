<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LocAR Demo</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/locar.js/dist/locar.min.js"></script>
</head>

<body>
  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; gpsMinDistance: 5;"
  >
    <a-camera gps-camera rotation-reader></a-camera>

    <!-- Test object -->
    <a-box
      gps-entity-place="latitude: 53.032; longitude: 5.658"
      color="red"
      scale="10 10 10">
    </a-box>

  </a-scene>
</body>
</html>
